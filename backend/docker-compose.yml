services:
  app:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    container_name: prism-app
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - db

  db:
    build:
      context: .
      dockerfile: infra/docker/postgres/Dockerfile
    container_name: prism-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_DATABASE:-laravel-prism}
      - POSTGRES_USER=${DB_USERNAME:-laravel}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-laravel}
    ports:
      - "${DB_LOCAL_PORT:-5432}:5432"

volumes:
  postgres_data: